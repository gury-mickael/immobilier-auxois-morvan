services:
  mariadb:
    image: mariadb:11
    container_name: immobilier_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: immobilier
      MARIADB_USER: immobilier
      MARIADB_PASSWORD: immobilier
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - immobilier_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  php:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    container_name: immobilier_php
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./ovh:/var/www/html
      - ./public/uploads:/var/www/html/uploads
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  immobilier_db_data:
